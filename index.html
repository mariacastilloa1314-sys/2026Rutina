<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1C1410"/>
<title>El Experimento · Oct 10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FAF8F5;
  --ivory2:#F5F1EC;
  --white:#FFFFFF;
  --ink:#1C1410;
  --ink2:#2E2018;
  --mu:#A0928A;
  --mu2:#C4B8B2;
  --gold:#C9A96E;
  --gold2:#A8873F;
  --gold3:#EDE0C4;
  --mauve:#B8909A;
  --mauve2:#D4B8C0;
  --sage:#7A9E84;
  --purple:#9060C0;
  --purple2:#7040A0;
  --purple3:rgba(144,96,192,.1);
  --border:#EAE4DE;
  --border2:#D8CFC8;
  --card:#FFFFFF;

  /* back-compat */
  --c:var(--ivory);--w:var(--gold3);--br:var(--ink);--br2:var(--ink2);
  --br3:#4A3028;--tr:var(--mauve);--tr2:#9A6070;--gd:var(--gold);
  --gd2:var(--gold2);--sg:var(--sage);--bl:var(--border);--wh:var(--white);

  --r:16px;
  --r-sm:10px;
  --r-pill:100px;
  --shad:0 1px 12px rgba(28,20,16,0.07);
  --shad2:0 4px 28px rgba(28,20,16,0.11);
  --ff:'Bodoni Moda',serif;
  --fb:'DM Sans',sans-serif;
  --fmono:'Courier Prime',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--ivory2);font-family:var(--fb);color:var(--ink);min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}

/* ══ HEADER ══ */
.hdr{background:var(--ivory);border-bottom:1px solid var(--border);padding:14px 18px 12px;position:sticky;top:0;z-index:200;box-shadow:0 1px 20px rgba(28,20,16,.06);}
.app-ttl{color:var(--ink);font-family:var(--ff);font-size:19px;font-style:italic;font-weight:400;letter-spacing:.5px;}
.app-sub{color:var(--gold2);font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-top:3px;font-weight:300;}
.moon-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.3);border-radius:var(--r-pill);padding:4px 12px;font-size:9px;color:var(--gold);letter-spacing:1px;font-weight:400;cursor:pointer;transition:background .2s;}
.moon-badge:hover{background:rgba(201,169,110,.16)}
.elem-badge{border-radius:var(--r-pill);padding:4px 12px;font-size:9px;letter-spacing:1px;font-weight:400;}
.clk-time{color:var(--ink);font-family:var(--fb);font-size:15px;font-weight:300;letter-spacing:3px;}
.clk-date{color:var(--mu);font-size:8px;margin-top:3px;letter-spacing:1.5px;font-weight:300;text-transform:uppercase;}
.pb{height:2px;background:var(--border);margin-top:11px;overflow:hidden;}
.pbf{height:100%;background:linear-gradient(90deg,var(--gold),rgba(201,169,110,.3));transition:width .9s cubic-bezier(.4,0,.2,1);}

/* ══ CONTENT ══ */
.content{padding:18px 16px 120px;max-width:500px;margin:0 auto;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content{animation:fadeIn .28s ease}

/* ══ SECTION LABEL ══ */
.sec-ttl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);margin:0 0 10px;display:flex;align-items:center;gap:10px;font-weight:400;}
.sec-ln{flex:1;height:1px;background:var(--border)}

/* ══ NOW CARD ══ */
.now-section{margin-bottom:18px}
.now-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px;font-weight:400;}
.now-pulse{width:5px;height:5px;background:var(--gold);border-radius:50%;box-shadow:0 0 0 0 rgba(201,169,110,.4);animation:ripple 2s infinite;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(201,169,110,.4)}70%{box-shadow:0 0 0 8px rgba(201,169,110,0)}100%{box-shadow:0 0 0 0 rgba(201,169,110,0)}}
.now-card{background:var(--white);border:1.5px solid rgba(201,169,110,.25);border-radius:20px;padding:22px 20px 18px;box-shadow:0 4px 28px rgba(28,20,16,.08);position:relative;overflow:hidden;}
.now-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.now-time{font-size:9px;color:rgba(201,169,110,.6);font-weight:400;letter-spacing:2.5px;margin-bottom:6px;text-transform:uppercase;}
.now-icon{font-size:22px;margin-bottom:10px;display:block}
.now-name{font-family:var(--ff);font-size:23px;font-weight:400;font-style:italic;color:var(--ink);line-height:1.2;margin-bottom:12px;}
.now-sci{font-size:11px;color:var(--mu);line-height:1.75;font-style:italic;border-left:1px solid rgba(201,169,110,.3);padding-left:12px;font-weight:300;}
.now-check{margin-top:16px;display:flex;justify-content:flex-end}
.done-btn{background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-pill);padding:10px 26px;font-size:10px;cursor:pointer;letter-spacing:1.5px;font-family:var(--fb);font-weight:600;transition:all .2s;text-transform:uppercase;}
.done-btn:active{transform:scale(.97)}
.done-btn.undone{background:var(--ivory2);border:1.5px solid var(--border2);color:var(--mu);}

/* ══ SCHEDULE CARDS ══ */
.scard{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:6px;cursor:pointer;transition:transform .15s, box-shadow .15s;box-shadow:var(--shad);border:none;}
.scard:active{transform:scale(.99)}
.scard.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none;}
.crow{display:flex;align-items:center;gap:10px}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ctm{color:var(--mu);font-size:10px;min-width:38px;font-weight:300;letter-spacing:.5px;}
.cico{font-size:15px;flex-shrink:0}
.clbl{flex:1;font-size:14px;font-weight:400;color:var(--ink)}
.clbl.done{text-decoration:line-through;color:var(--mu2);font-weight:300}
.ckbtn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;}
.ckbtn.on{background:var(--sage);border-color:var(--sage);color:white}
.sci-box{margin-top:9px;padding:10px 13px;background:rgba(201,169,110,.04);border-left:1.5px solid rgba(201,169,110,.25);border-radius:0 8px 8px 0;font-size:11px;color:var(--mu);line-height:1.75;font-style:italic;font-weight:300;}
.pcard{background:rgba(250,248,245,.7);border-radius:var(--r-sm);padding:8px 13px;margin-bottom:5px;opacity:.45;cursor:pointer;box-shadow:none;}
.pcard.done{opacity:.6;background:rgba(122,158,132,.06)}
.prow{display:flex;align-items:center;gap:8px}
.past-toggle{width:100%;background:none;border:none;padding:10px 0;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu2);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:4px;font-family:var(--fb);font-weight:300;}

/* ══ WORKOUT ══ */
.ex-card{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;box-shadow:var(--shad);}
.ex-card:active{transform:scale(.99)}
.ex-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none;}
.ex-name{font-size:14px;font-weight:400;color:var(--ink)}
.ex-name.done{text-decoration:line-through;color:var(--mu2);font-weight:300}
.ex-meta{font-size:10px;color:var(--mu);margin-top:2px;font-weight:300;letter-spacing:.3px;}
.wu-box{background:rgba(122,158,132,.07);border-radius:var(--r-sm);padding:12px 14px;font-size:12px;color:#3A5A40;line-height:1.65;margin-bottom:12px;font-weight:300;}
.prot-box{background:rgba(201,169,110,.06);border-radius:var(--r-sm);padding:12px 14px;font-size:12px;color:var(--gold2);line-height:1.65;margin-top:10px;font-weight:300;}

/* ══ MECANOGRAFÍA ══ */
.meca-typing-area{
  background:var(--ink);
  border-radius:16px;
  padding:20px;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
}
.meca-typing-area::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);}
.meca-text{font-family:var(--fmono);font-size:14px;line-height:1.9;color:rgba(255,255,255,.35);letter-spacing:.5px;margin-bottom:14px;user-select:none;}
.meca-text .correct{color:#7A9E84;}
.meca-text .wrong{color:#B8909A;text-decoration:underline;}
.meca-text .cursor{border-right:2px solid var(--gold);animation:blink .8s step-end infinite;}
@keyframes blink{0%,100%{border-color:var(--gold)}50%{border-color:transparent}}
.meca-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;font-family:var(--fmono);font-size:13px;color:var(--ivory);outline:none;resize:none;height:72px;letter-spacing:.5px;}
.meca-input:focus{border-color:rgba(144,96,192,.5);}
.wpm-badge{display:inline-flex;align-items:center;gap:6px;background:var(--purple3);border:1px solid rgba(144,96,192,.3);border-radius:var(--r-pill);padding:5px 14px;font-size:10px;color:var(--purple);font-weight:600;letter-spacing:1px;}

/* ══ ENGLISH CARDS ══ */
.eng-card{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shad);}
.eng-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none;}
.eng-phase-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px;}
.eng-phase-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .8s ease;}

/* ══ STATS ══ */
.big-num{font-family:var(--ff);font-size:50px;color:var(--mauve);font-weight:400;line-height:1}
.big-lbl{font-size:9px;color:var(--mu);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;font-weight:300}

/* ══ VISION QUOTE ══ */
.vision-quote{background:var(--white);border:1.5px solid rgba(201,169,110,.2);box-shadow:0 4px 24px rgba(28,20,16,.07);border-radius:20px;padding:28px 22px;margin-bottom:16px;position:relative;overflow:hidden;text-align:center;}
.vision-quote::before{content:'\201C';position:absolute;top:8px;left:14px;font-size:72px;color:rgba(201,169,110,.06);font-family:serif;line-height:1;pointer-events:none;}
.vision-quote-txt{font-family:var(--ff);font-size:17px;font-style:italic;color:var(--ink);line-height:1.85;margin-bottom:10px;position:relative;}
.vision-quote-src{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);font-weight:300;}

/* ══ DRAWER ══ */
.drw-btn{display:flex;align-items:center;gap:14px;width:100%;padding:13px 14px;background:none;border:none;border-radius:12px;cursor:pointer;text-align:left;transition:background .18s;margin-bottom:4px;}
.drw-btn:hover,.drw-btn.active{background:rgba(201,169,110,.1);}
.drw-ico{font-size:20px;line-height:1;width:26px;text-align:center;}
.drw-lbl{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);font-weight:400;letter-spacing:.2px;}
.drw-btn.active .drw-lbl{color:var(--gold2);font-weight:600;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--ivory);padding:10px 20px;border-radius:var(--r-pill);font-size:11px;font-family:var(--fb);letter-spacing:.5px;display:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);}

/* ══ ANIMATIONS ══ */
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.slide-r{animation:slideInR .25s cubic-bezier(.4,0,.2,1) both;}

/* ══ COUNTDOWN BANNER ══ */
.oct-banner{
  background:linear-gradient(135deg,var(--ink),#2E2018);
  border-radius:16px;padding:14px 18px;margin-bottom:14px;
  border:1px solid rgba(201,169,110,.15);
  display:flex;align-items:center;gap:16px;
}
.oct-num{font-family:var(--ff);font-size:42px;font-style:italic;color:var(--gold);line-height:1;}
.oct-days-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu);font-weight:300;margin-top:2px;}
.oct-exp-lbl{font-size:10px;color:rgba(201,169,110,.7);letter-spacing:1px;}
.oct-progress{flex:1}
.oct-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:8px;}
.oct-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--mauve));border-radius:2px;transition:width 1s ease;}
</style>
</head>
<body>

<!-- ══════════════════════════════ -->
<!--  WELCOME SCREEN               -->
<!-- ══════════════════════════════ -->
<div id="welcome" style="position:fixed;inset:0;z-index:900;background:#1C1410;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 28px;transition:opacity .6s">
  <div style="width:100%;max-width:360px;text-align:center">
    <div id="w-days" style="font-size:60px;font-family:'Bodoni Moda',serif;font-style:italic;color:#C9A96E;line-height:1;margin-bottom:4px">—</div>
    <div style="font-size:8px;letter-spacing:3px;text-transform:uppercase;color:#A8873F;margin-bottom:24px">días para el 10 de octubre</div>
    <div style="width:60px;height:1px;background:rgba(201,169,110,.3);margin:0 auto 24px"></div>
    <div id="w-quote" style="font-family:'Bodoni Moda',serif;font-size:20px;font-style:italic;color:#FAF8F5;line-height:1.7;margin-bottom:12px">&ldquo;&rdquo;</div>
    <div id="w-author" style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#A0928A;margin-bottom:40px">&nbsp;</div>
    <div id="w-date" style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#A8873F;margin-bottom:36px">cargando...</div>
    <button onclick="closeWelcome()" style="display:block;width:100%;padding:17px;background:var(--gold,#C9A96E);border:none;border-radius:14px;color:#1C1410;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;margin-bottom:12px;font-weight:600">Comenzar el día</button>
    <button onclick="closeWelcome()" style="display:block;width:100%;padding:10px;background:none;border:none;color:#A0928A;font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;letter-spacing:1px">saltar →</button>
  </div>

<script>
(function(){
  var Q=[
    {q:"Si los ancestros aprendían sin tecnología, no tienes excusa.",a:"El científico loco"},
    {q:"Elegiste ser el experimento. Ahora sé la hipótesis que se comprueba.",a:"—"},
    {q:"La epigenética demostró lo que los ancestros sabían: el ambiente forma al ser.",a:"Bruce Lipton"},
    {q:"Seis meses de práctica deliberada producen cambios que duran décadas.",a:"Anders Ericsson"},
    {q:"Los rituales no son superstición — son arquitectura de la mente.",a:"Neurología del hábito"},
    {q:"Quien controla su respiración, controla su estado interno.",a:"Wim Hof"},
    {q:"El músculo crece mientras duermes, no mientras entrenas.",a:"Fisiología"},
    {q:"La luna no pide permiso para cambiar de fase. Tú tampoco.",a:"—"},
    {q:"Una mente entrenada ve patrones donde los demás ven caos.",a:"—"},
    {q:"Ser rara no es un defecto de diseño. Es el diseño.",a:"—"},
    {q:"La ciencia sin alma informa. El alma sin ciencia sueña. Juntas transforman.",a:"—"},
    {q:"Tu acento es tu firma. Tu historia es tu activo.",a:"—"},
    {q:"El subconsciente reprograma con repetición y emoción juntos.",a:"PNL · Baudoin"},
    {q:"I am becoming fluent. It is already happening.",a:"—"},
    {q:"Cada tecla que aprendes hoy es velocidad que tendrás en octubre.",a:"El científico loco"},
    {q:"Los telómeros se alargan con ejercicio constante. Estás construyendo más vida.",a:"Elizabeth Blackburn"},
    {q:"El cortisol baja cuando dejas de correrte de ti misma.",a:"—"},
    {q:"Constancia sin perfección mueve montañas. Perfección sin constancia no mueve nada.",a:"—"},
    {q:"El flow requiere que la tarea y la habilidad estén al límite. Empuja el límite.",a:"Csikszentmihalyi"},
    {q:"Octubre te espera. Tiene cara de alguien que no puso excusas.",a:"—"},
    {q:"Transforma y créate — un día a la vez.",a:"Experimento 2026"},
    {q:"La intuición es experiencia comprimida. Confía en ella, pero también entrénala.",a:"Gary Klein"},
    {q:"Lo ancestral no es lo opuesto a lo científico. Es su origen.",a:"—"},
    {q:"La creatividad no es un don. Es un músculo. Se entrena.",a:"—"},
    {q:"Tu combinación de habilidades es única. Úsala sin pedir permiso.",a:"—"},
    {q:"El sueño es el hábito de alto rendimiento más subestimado.",a:"Matthew Walker"},
    {q:"Los sistemas ganan a la motivación. La rutina gana al impulso.",a:"—"},
    {q:"La marca personal no se construye — se revela.",a:"—"},
    {q:"Lo que planto hoy, lo cosecho en octubre. Ya está plantado.",a:"Tradición andina"},
    {q:"El subconsciente trabaja 24 horas. Dale las instrucciones correctas.",a:"Joseph Murphy"},
  ];
  var d=new Date();
  var DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var oct10=new Date(2026,9,10);
  var daysLeft=Math.max(0,Math.ceil((oct10-d)/864e5));
  var q=Q[(d.getDate()+d.getMonth()*7)%Q.length];
  var el_d=document.getElementById('w-date');
  var el_q=document.getElementById('w-quote');
  var el_a=document.getElementById('w-author');
  var el_days=document.getElementById('w-days');
  if(el_d) el_d.textContent=DAYS[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()]+' · 2026';
  if(el_q) el_q.textContent='"'+q.q+'"';
  if(el_a&&q.a!=='—') el_a.textContent='— '+q.a;
  if(el_days) el_days.textContent=daysLeft;
  if(sessionStorage.getItem('wel')){
    var ov=document.getElementById('welcome');
    if(ov) ov.style.display='none';
  }
})();
</script></div>

<!-- ══════════════════════════════ -->
<!--  SIDEBAR DRAWER               -->
<!-- ══════════════════════════════ -->
<div id="drawer-overlay" onclick="closeDrawer()" style="position:fixed;inset:0;z-index:700;background:rgba(28,20,16,.35);opacity:0;pointer-events:none;transition:opacity .3s"></div>
<aside id="drawer" style="position:fixed;top:0;left:0;bottom:0;z-index:800;width:260px;background:var(--white);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 32px rgba(28,20,16,.12)">
  <div style="padding:28px 24px 16px">
    <div style="font-family:'Bodoni Moda',serif;font-size:20px;font-style:italic;color:var(--ink);margin-bottom:2px">El Experimento</div>
    <div style="font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2)">10 de octubre · 2026</div>
  </div>
  <div style="height:1px;background:var(--border);margin:0 24px 12px"></div>
  <nav style="flex:1;overflow-y:auto;padding:0 12px">
    <button class="drw-btn active" onclick="swDrawer('hoy',this)"><span class="drw-ico">☀️</span><span class="drw-lbl">Hoy</span></button>
    <button class="drw-btn" onclick="swDrawer('cuerpo',this)"><span class="drw-ico">💪</span><span class="drw-lbl">Cuerpo</span></button>
    <button class="drw-btn" onclick="swDrawer('mente',this)"><span class="drw-ico">🇬🇧</span><span class="drw-lbl">Inglés</span></button>
    <button class="drw-btn" onclick="swDrawer('voz',this)"><span class="drw-ico">🎤</span><span class="drw-lbl">Voz</span></button>

function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[1047,1319,1568,2093];
    notes.forEach((f,i)=>{
      [1,2.756].forEach(harm=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.value=f*harm;
        const t=ctx.currentTime+i*.22;
        const vol=harm===1?.18:.06;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(vol,t+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+1.2);
        o.start(t);o.stop(t+1.25);
      });
    });
  }catch(e){}
}

  h+='<div style="font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);font-weight:300">actividades completadas hoy</div>';
  h+='<button onclick="if(confirm(\'¿Reiniciar las marcas de hoy?\')){localStorage.removeItem(\'done_\'+TK);done={};render();}" style="font-size:9px;color:var(--mu);background:none;border:none;cursor:pointer;padding:0">↺ reiniciar</button>';

  if(q.a&&q.a!=='—') h+='<div class="vision-quote-src">— '+q.a+'</div>';
  h+='</div>';

  // Schedule
  var past=[],upcoming=[];var current=null;
  for(var item of SCHED){
    var itemMin=t2m(item.t);
    if(item.id===cid){current=item;}
    else if(itemMin<curMin){past.push(item);}
    else{upcoming.push(item);}
  }

  if(current){
    var isDone=!!done[current.id];
    h+='<div class="now-section">';
    h+='<div class="now-label"><span class="now-pulse"></span> AHORA MISMO</div>';
    h+='<div class="now-card">';
    h+='<div class="now-time">'+current.t+' · '+current.cat+'</div>';
    h+='<div class="now-icon">'+current.i+'</div>';
    h+='<div class="now-name">'+current.l+'</div>';
    h+='<div class="now-sci">'+current.s+'</div>';
    h+='<div class="now-check"><button class="done-btn '+(isDone?"":"undone")+'" onclick="tog('+current.id+')">'+(isDone?"✓ Completada — tap para desmarcar":"Marcar como completada")+'</button></div>';
    h+='</div></div>';
  }

  if(upcoming.length){
    h+='<div class="sec-ttl"><span>Próximas</span><div class="sec-ln"></div></div>';
    upcoming.forEach(function(item){
      var isDone=!!done[item.id];
      var isExp=expanded===item.id;
      h+='<div class="scard '+(isDone?"done":"")+'" onclick="togExp('+item.id+')">';
      h+='<div class="crow">';
      h+='<div class="cdot" style="background:'+(CAT_C[item.cat]||"#888")+'"></div>';
      h+='<span class="ctm">'+item.t+'</span>';
      h+='<span class="cico">'+item.i+'</span>';
      h+='<span class="clbl '+(isDone?"done":"")+'">'+item.l+'</span>';
      h+='<button class="ckbtn '+(isDone?"on":"")+'" onclick="event.stopPropagation();tog('+item.id+')">'+(isDone?"✓":"")+'</button>';
      h+='</div>';
      if(isExp) h+='<div class="sci-box">'+item.s+'</div>';
      h+='</div>';
    });
  }

  if(past.length){
    h+='<button class="past-toggle" onclick="pastOpen=!pastOpen;render()">';
    h+='<div class="sec-ln"></div><span>'+(pastOpen?"▾":"▸")+' Ya pasaron ('+past.length+')</span><div class="sec-ln"></div>';
    h+='</button>';
    if(pastOpen){
      past.forEach(function(item){
        var isDone=!!done[item.id];
        var isExp=expanded===("p"+item.id);
        h+='<div class="pcard '+(isDone?"done":"")+'" onclick="togExp(\'p\'+'+item.id+')">';
        h+='<div class="prow">';
        h+='<span style="font-size:14px">'+item.i+'</span>';
        h+='<span class="ctm" style="font-size:10px">'+item.t+'</span>';
        h+='<span style="flex:1;font-size:12px;color:var(--mu);'+(isDone?"text-decoration:line-through":"")+'">' +item.l+'</span>';
        h+='<button class="ckbtn '+(isDone?"on":"")+'" onclick="event.stopPropagation();tog('+item.id+')" style="opacity:1">'+(isDone?"✓":"")+'</button>';
        h+='</div>';
        if(isExp) h+='<div class="sci-box" style="font-size:11px">'+item.s+'</div>';
        h+='</div>';
      });
    }
  }

  return h;
}

function getWeekSummary(){
  var now=new Date(),dow=now.getDay();
  var mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  var days=[1,2,3,4,5].map(function(i){
    var d=new Date(mon);d.setDate(mon.getDate()+(i-1));
    var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var data=JSON.parse(localStorage.getItem("done_"+k)||"{}");
    var cnt=Object.values(data).filter(Boolean).length;
    return{d:["L","M","X","J","V"][i-1],pct:SCHED.length>0?Math.round(cnt/SCHED.length*100):0,cnt};
  });
  return{days,total:days.reduce(function(a,b){return a+b.cnt;},0),avg:Math.round(days.reduce(function(a,b){return a+b.pct;},0)/5)};
}

// Typing test functions (global)
var _mecaStart=0,_mecaText='',_mecaActive=false;

function mecaOnInput(textarea,textId,textContent){
  var typed=textarea.value;
  if(!_mecaActive&&typed.length===1){
    _mecaStart=Date.now();
    _mecaActive=true;
  }
  if(!_mecaActive) return;

  // Update display
  var display=document.getElementById('meca-display');
  if(display){
    var html='';
    for(var i=0;i<textContent.length;i++){
      if(i<typed.length){
        if(typed[i]===textContent[i]){
          html+='<span style="color:#7A9E84">'+textContent[i]+'</span>';
        } else {
          html+='<span style="color:#B8909A;text-decoration:underline">'+textContent[i]+'</span>';
        }
      } else if(i===typed.length){
        html+='<span style="border-right:2px solid #C9A96E">'+textContent[i]+'</span>';
      } else {
        html+='<span style="color:rgba(250,248,245,.3)">'+textContent[i]+'</span>';
      }
    }
    display.innerHTML=html;
  }

  // Check if done
  if(typed.length>=textContent.length){
    var elapsed=(Date.now()-_mecaStart)/60000;
    var words=textContent.trim().split(/\s+/).length;
    var wpm=Math.round(words/elapsed);
    var correct=0;
    for(var j=0;j<Math.min(typed.length,textContent.length);j++){
      if(typed[j]===textContent[j]) correct++;
    }
    var acc=Math.round(correct/textContent.length*100);

    // Save
    mecaD=JSON.parse(localStorage.getItem("meca_wpm")||"{}");
    mecaD[TK]={wpm:wpm,acc:acc,ts:Date.now()};
    localStorage.setItem("meca_wpm",JSON.stringify(mecaD));
    _mecaActive=false;

    // Show result
    var wpmEl=document.getElementById('meca-wpm');
    var accEl=document.getElementById('meca-acc');
    if(wpmEl) wpmEl.textContent=wpm+' WPM';
    if(accEl) accEl.textContent=acc+'% precisión';
    textarea.style.borderColor='rgba(122,158,132,.5)';
    playChime();
    toast('✓ Test completado: '+wpm+' WPM · '+acc+'% precisión');
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  var el=document.getElementById("content");
  try{
    var content='';
    if(tab==="hoy")     content=renderHoy();
    else if(tab==="cuerpo") content=renderCuerpo();
    else if(tab==="mente")  content=renderMente();
    else if(tab==="voz")    content=renderVoz();
    else if(tab==="meca")   content=renderMeca();
    else if(tab==="pnl")    content=renderPnl();
    else if(tab==="vision") content=renderVision();
    else if(tab==="dinero") content=renderDinero();
    else if(tab==="crear")  content=renderCrear();
    else content=renderHoy();
    el.innerHTML=content;
  }catch(err){
    el.innerHTML='<div style="padding:24px;color:var(--ink);font-size:13px;line-height:1.7"><b>Error en '+tab+':</b><br>'+err.message+'<br><small style="color:var(--mu)">'+err.stack.split("\n").slice(0,3).join("<br>")+'</small></div>';
  }
  try{updateProgress();}catch(e){}
}

// ═══════════════════════════════════════════
//  CREAR HELPERS
// ═══════════════════════════════════════════
function addProyecto(){
  var el=document.getElementById('proy-nombre');
  var ef=document.getElementById('proy-fecha');
  if(!el||!el.value.trim())return;
  var d=JSON.parse(localStorage.getItem('crear_data')||'{}');
  if(!d.proyectos) d.proyectos=[];
  var fecha=ef&&ef.value.trim()?ef.value.trim():(function(){var n=new Date();return n.getDate()+'/'+(n.getMonth()+1)+'/'+n.getFullYear();}());
  d.proyectos.push({nombre:el.value.trim(),fecha:fecha,done:false});
  localStorage.setItem('crear_data',JSON.stringify(d));
  render();
}
function delProyecto(i){
  var d=JSON.parse(localStorage.getItem('crear_data')||'{}');
  if(d.proyectos) d.proyectos.splice(i,1);
  localStorage.setItem('crear_data',JSON.stringify(d));
  render();
}
function togProyecto(i){
  var d=JSON.parse(localStorage.getItem('crear_data')||'{}');
  if(d.proyectos&&d.proyectos[i]) d.proyectos[i].done=!d.proyectos[i].done;
  localStorage.setItem('crear_data',JSON.stringify(d));
  render();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();
tick();
updateProgress();
setInterval(tick, 15000);
